name: 🎮 Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.3"
  GODOT_RELEASE: "stable"
  EXPORT_NAME: "SnoopDoggRetssal"

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install Android Components
        run: |
          sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
            "build-tools;34.0.0" \
            "platform-tools" \
            "platforms;android-34" \
            "ndk;23.2.8568313"

          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/23.2.8568313" >> $GITHUB_ENV

      - name: 🎮 Install Godot
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64.zip -O godot.zip
          unzip -q godot.zip
          sudo mv Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64 /usr/local/bin/godot
          chmod +x /usr/local/bin/godot
          godot --version

      - name: 📋 Install Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}

          wget -q https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_export_templates.tpz -O templates.tpz

          unzip -q templates.tpz -d templates
          mv templates/templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}/

      - name: 🔑 Generate Debug Keystore
        run: |
          keytool -genkey -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Debug,O=DAVCourt,C=DK"

      - name: ⚙️ Configure Godot Editor Settings
        run: |
          mkdir -p ~/.config/godot

          cat <<EOF > ~/.config/godot/editor_settings-4.tres
[gd_resource type="EditorSettings" format=3]

[resource]
export/android/android_sdk_path="$ANDROID_SDK_ROOT"
export/android/android_ndk_path="$ANDROID_SDK_ROOT/ndk/23.2.8568313"
export/android/debug_keystore="$(pwd)/debug.keystore"
export/android/debug_keystore_user="androiddebugkey"
export/android/debug_keystore_pass="android"
export/android/force_system_user=false
export/android/shutdown_adb_on_exit=true
export/android/one_click_deploy_clear_previous_install=false
EOF

      - name: 🏗️ Build APK
        run: |
          mkdir -p build/android

          godot --headless --verbose \
            --export-debug "Android" \
            build/android/${EXPORT_NAME}.apk

          ls -lh build/android/

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/android/${{ env.EXPORT_NAME }}.apk

      - name: 🚀 Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Build ${{ github.run_number }}
          files: build/android/${{ env.EXPORT_NAME }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
