<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background -->
  <rect width="128" height="128" rx="20" fill="#1a0a2e"/>
  <!-- Courthouse columns -->
  <rect x="20" y="55" width="8" height="55" fill="#8B7355"/>
  <rect x="100" y="55" width="8" height="55" fill="#8B7355"/>
  <rect x="40" y="60" width="8" height="50" fill="#8B7355"/>
  <rect x="80" y="60" width="8" height="50" fill="#8B7355"/>
  <!-- Roof/pediment -->
  <polygon points="10,55 118,55 64,20" fill="#c9a84c"/>
  <!-- Base -->
  <rect x="10" y="108" width="108" height="12" fill="#8B7355"/>
  <!-- Judge hat (Snoop style) -->
  <ellipse cx="64" cy="45" rx="22" ry="5" fill="#f5f0e8"/>
  <rect x="48" y="22" width="32" height="24" rx="4" fill="#f5f0e8"/>
  <!-- Sunglasses -->
  <rect x="50" y="30" width="10" height="7" rx="3" fill="#1a1a2e" opacity="0.9"/>
  <rect x="68" y="30" width="10" height="7" rx="3" fill="#1a1a2e" opacity="0.9"/>
  <line x1="60" y1="33" x2="68" y2="33" stroke="#888" stroke-width="1.5"/>
  <!-- Gavel -->
  <rect x="78" y="62" width="22" height="8" rx="3" fill="#c9a84c"/>
  <rect x="86" y="58" width="6" height="18" rx="2" fill="#8B7355"/>
  <!-- Stars -->
  <text x="18" y="18" font-size="12" fill="#FFD700">⭐</text>
  <text x="95" y="18" font-size="12" fill="#FFD700">⭐</text>
  <!-- Text -->
  <text x="64" y="122" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="#c9a84c">SNOOP DOGG</text>
</svg>
